jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./ReactAiChatBot

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: './ReactAiChatBot/package-lock.json' # <-- ADD THIS LINE

    - name: Install dependencies
      run: npm ci

    - name: Build the app
      run: npm run build --if-present

    - name: Run tests
      run: npm test -- --passWithNoTests
